<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Todo App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-200 flex justify-center items-center h-screen">
    <div class="bg-white p-10 rounded shadow-sm max-w-[500px] w-full">

        <h1 class="text-blue-600 font-bold text-2xl">Todo List</h1>


        <form method="GET">
            <div class="flex gap-4 my-2">
                <input class="border p-2 round flex-1" type="text" name="task" placeholder="Add a new task..." />

                <input type="submit" class="py-2 px-4 bg-black text-white rounded" value="Add" />
            </div>

            <!-- Render existing tasks as checkboxes -->
            <ul>
                <li class="p-1 hover:bg-gray-200">
                    <input type="checkbox"> Task 1
                </li>
                <li class="p-1 hover:bg-gray-200">
                    <input type="checkbox"> Task 2
                </li>
            </ul>
        </form>
    </div>
</body>

</html>
