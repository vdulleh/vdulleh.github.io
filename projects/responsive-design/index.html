<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="./app.css"/>
</head>
<body>

  <h1>Create an Account</h1>
  <p>Fill in the details below to register.</p>

  <form action="/register" method="POST">

    <fieldset>
      <legend>Personal Information</legend>

      <label for="first-name">First Name</label><br />
      <input type="text" id="first-name" name="first_name" placeholder="John" required /><br /><br />

      <label for="last-name">Last Name</label><br />
      <input type="text" id="last-name" name="last_name" placeholder="Doe" required /><br /><br />

      <label for="dob">Date of Birth</label><br />
      <input type="date" id="dob" name="dob" required /><br /><br />

      <label for="gender">Gender</label><br />
      <select id="gender" name="gender">
        <option value="">-- Select --</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
        <option value="prefer-not">Prefer not to say</option>
      </select><br /><br />

    </fieldset>

    <br/>

    <fieldset>
      <legend>Contact Details</legend>

      <label for="email">Email Address</label><br />
      <input type="email" id="email" name="email" placeholder="john@example.com" required /><br /><br />

      <label for="phone">Phone Number</label><br />
      <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900" /><br /><br />

    </fieldset>

    <br />

    <fieldset>
      <legend>Account Security</legend>

      <label for="username">Username</label><br />
      <input type="text" id="username" name="username" placeholder="johndoe123" required /><br /><br />

      <label for="password">Password</label><br />
      <input type="password" id="password" name="password" required /><br /><br />

      <label for="confirm-password">Confirm Password</label><br />
      <input type="password" id="confirm-password" name="confirm_password" required /><br /><br />

    </fieldset>

    <br />

    <fieldset class="pref-block">
      <legend>Preferences</legend>

      <label for="country">Country</label><br />
      <select id="country" name="country">
        <option value="">-- Select Country --</option>
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
        <option value="au">Australia</option>
        <option value="ca">Canada</option>
        <option value="other">Other</option>
      </select><br /><br />

      <label for="language">Preferred Language</label><br />
      <select id="language" name="language">
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
      </select><br /><br />

      <p>Notifications:</p>
      <input type="checkbox" id="notify-email" name="notify_email" value="1" />
      <label for="notify-email">Email notifications</label><br />
      <input type="checkbox" id="notify-sms" name="notify_sms" value="1" />
      <label for="notify-sms">SMS notifications</label><br /><br />

    </fieldset>

    <br />

    <fieldset>
      <legend>Terms & Conditions</legend>

      <input type="checkbox" id="terms" name="terms" required />
      <label for="terms">I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a></label><br /><br />

      <input type="checkbox" id="marketing" name="marketing" />
      <label for="marketing">I'd like to receive marketing communications</label><br /><br />

    </fieldset>

    <br />

    <button type="reset">Clear Form</button>
    <button type="submit">Create Account</button>

  </form>

  <p>Already have an account? <a href="/login">Sign in</a></p>

</body>
</html>
